<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sample合同会社 - 不動産FP専門の東京の会社。資産形成、相続対策、不動産投資のプロフェッショナル。">
<title>Sample合同会社 | 不動産FP・東京</title>
<style>
/* Modal-Preview Auto-Rotate Cube: 2026/4/22 */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-1: #0f172a;
  --bg-2: #1e3a8a;
  --bg-3: #0ea5e9;
  --accent: #38bdf8;
  --accent-2: #f59e0b;
  --text: #f8fafc;
  --text-dim: #cbd5e1;
  --face-bg: rgba(15, 23, 42, 0.82);
  --face-border: rgba(56, 189, 248, 0.45);
  --modal-bg: rgba(2, 6, 23, 0.92);
  --modal-panel: #0f172a;
  --btn-bg: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
  --radius: 14px;
  --cube-size: 260px;
}

html, body {
  height: 100%;
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, -apple-system, sans-serif;
  background: var(--bg-1);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.7;
}

/* ========= HERO ========= */
.hero {
  position: relative;
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 60px;
  background: radial-gradient(ellipse at top, #1e40af 0%, #0f172a 45%, #020617 100%);
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(245, 158, 11, 0.15), transparent 45%);
  pointer-events: none;
}

.brand {
  position: absolute;
  top: 24px;
  left: 28px;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--text);
  z-index: 5;
}
.brand span { color: var(--accent); }

.hero-title {
  position: relative;
  text-align: center;
  margin-bottom: 48px;
  z-index: 2;
  user-select: none;
  -webkit-user-select: none;
}
.hero-title h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  letter-spacing: 0.04em;
  line-height: 1.3;
  background: linear-gradient(120deg, #ffffff 0%, #38bdf8 60%, #f59e0b 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-title p {
  margin-top: 14px;
  font-size: clamp(14px, 1.7vw, 18px);
  color: var(--text-dim);
}

/* ========= 3D SCENE ========= */
.scene-wrap {
  display: inline-block;
  margin: 30px auto 10px;
  will-change: transform;
  /* JS applies translate() for the floating motion */
}

.scene {
  position: relative;
  width: var(--cube-size);
  height: var(--cube-size);
  perspective: 800px;
  cursor: grab;
  z-index: 2;
  touch-action: none;
  transition: transform 0.75s cubic-bezier(.7, 0, .2, 1), filter 0.5s ease;
  transform: scale(1);
  /* ドラッグ時の文字選択ハイライトを無効化 */
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
.scene, .scene * {
  user-select: none;
  -webkit-user-select: none;
}
.scene:active { cursor: grabbing; }
.scene.zooming {
  transform: scale(1.18);
  filter: brightness(1.12) saturate(1.1);
}

.cube {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transform: rotateX(20deg) rotateY(0deg);
  will-change: transform;
}

.face {
  position: absolute;
  inset: 0;
  /* visual styles moved to .face-panel (the "door") */
}

/* Interior glow revealed when the door opens */
.face::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  background:
    radial-gradient(circle at 30% 50%, rgba(245, 158, 11, 0.55), transparent 65%),
    radial-gradient(circle at 70% 50%, rgba(56, 189, 248, 0.35), transparent 60%);
  opacity: 0;
  transition: opacity 0.45s 0.2s ease-out;
  pointer-events: none;
  z-index: 0;
}
.face.opening::before {
  opacity: 1;
}

/* .face-panel = the door that swings open */
.face-panel {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--face-bg);
  border: 2px solid var(--face-border);
  border-radius: var(--radius);
  backdrop-filter: blur(6px);
  box-shadow:
    inset 0 0 40px rgba(56, 189, 248, 0.15),
    0 10px 40px rgba(0, 0, 0, 0.5);
  transform-origin: left center;
  transform: rotateY(0deg);
  transition:
    transform 0.75s cubic-bezier(.7, 0, .2, 1),
    border-color 0.4s,
    box-shadow 0.5s;
  backface-visibility: hidden;
  z-index: 1;
}
.face.active .face-panel {
  border-color: var(--accent-2);
  box-shadow:
    inset 0 0 60px rgba(245, 158, 11, 0.25),
    0 12px 50px rgba(245, 158, 11, 0.35);
}
.face.opening .face-panel {
  transform: rotateY(-118deg);
  box-shadow:
    -30px 0 60px rgba(0, 0, 0, 0.75),
    inset 40px 0 30px rgba(0, 0, 0, 0.45);
}
.face.opening .face-panel button {
  pointer-events: none !important;
}

.face button {
  font: inherit;
  color: #f8fafc;
  background: transparent;
  border: none;
  padding: 10px 14px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  pointer-events: auto;  /* default clickable; backface-visibility on panel hides back */
  backface-visibility: hidden;
  /* 選択ハイライト無効化 */
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  /* 3D / embossed text — natural depth */
  text-shadow:
    0 1px 0 rgba(255, 255, 255, 0.15),
    0 2px 0 rgba(255, 255, 255, 0.08),
    0 3px 0 rgba(0, 0, 0, 0.35),
    0 5px 6px rgba(0, 0, 0, 0.5),
    0 0 18px rgba(56, 189, 248, 0.25);
  transition: transform 0.3s ease, text-shadow 0.3s ease, color 0.3s ease, letter-spacing 0.3s ease;
}
.face button:hover,
.face button:focus-visible {
  transform: translateY(-2px) scale(1.05);
  color: #ffffff;
  letter-spacing: 0.12em;
  text-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25),
    0 2px 0 rgba(255, 255, 255, 0.15),
    0 3px 0 rgba(0, 0, 0, 0.4),
    0 6px 10px rgba(0, 0, 0, 0.55),
    0 0 22px rgba(245, 158, 11, 0.55);
  outline: none;
}

/* 6 face positions */
.face.front  { transform: translateZ(calc(var(--cube-size) / 2)); }
.face.back   { transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2)); }
.face.right  { transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2)); }
.face.left   { transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2)); }
.face.top    { transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2)); }
.face.bottom { transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2)); }

/* ========= Hint / Controls ========= */
.hint {
  margin-top: 42px;
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  z-index: 2;
  position: relative;
}
.hint kbd {
  background: rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  margin: 0 2px;
}

.rotate-toggle {
  position: absolute;
  top: 24px;
  right: 28px;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
  z-index: 5;
  transition: background 0.25s;
}
.rotate-toggle:hover { background: rgba(255,255,255,0.15); }

/* ========= MODAL ========= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-bg);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s;
  z-index: 100;
}
.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}
.modal {
  background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 18px;
  max-width: 640px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 40px 32px 32px;
  position: relative;
  transform: translateY(20px) scale(0.96);
  transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}
.modal h2 {
  font-size: 26px;
  margin-bottom: 18px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.modal p {
  color: var(--text-dim);
  font-size: 15px;
  margin-bottom: 14px;
}
.modal .tag {
  display: inline-block;
  background: rgba(245, 158, 11, 0.15);
  color: var(--accent-2);
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 16px;
  letter-spacing: 0.1em;
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s, transform 0.25s;
}
.modal-close:hover,
.modal-close:focus-visible {
  background: var(--accent-2);
  transform: rotate(90deg);
  outline: none;
}
.modal-footer {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 13px;
  color: var(--text-dim);
}
.modal-footer .preview-note {
  display: inline-block;
  background: rgba(14, 165, 233, 0.15);
  color: var(--accent);
  padding: 6px 12px;
  border-radius: 8px;
  margin-top: 6px;
}

/* ========= RESPONSIVE ========= */
@media (max-width: 640px) {
  :root { --cube-size: 200px; }
  .brand { font-size: 15px; top: 18px; left: 18px; }
  .rotate-toggle { top: 18px; right: 18px; font-size: 12px; padding: 6px 10px; }
  .face button { font-size: 17px; padding: 8px 10px; }
  .modal { padding: 36px 20px 24px; }
  .modal h2 { font-size: 22px; }
}

@media (prefers-reduced-motion: reduce) {
  .cube { transition: none !important; }
  .modal { transition: none !important; }
}
</style>
</head>
<body>

<div class="brand">Sam<span>ple</span> 合同会社</div>
<button id="rotate-toggle" class="rotate-toggle" aria-pressed="true">⏸ 自動回転ON</button>

<section class="hero" aria-label="ヒーローセクション">
  <div class="hero-title">
    <h1>資産の未来を、<br>設計する。</h1>
    <p>Sample合同会社 — 東京発・不動産FPのプロフェッショナル</p>
  </div>

  <div class="scene-wrap">
  <div id="hero-cube" class="scene" role="group" aria-label="3Dナビゲーションキューブ">
    <div class="cube" id="cube">
      <div class="face front" data-face="front">
        <div class="face-panel">
          <button type="button" data-modal="company" aria-label="会社概要を見る">会社概要</button>
        </div>
      </div>
      <div class="face back" data-face="back">
        <div class="face-panel">
          <button type="button" data-modal="contact" aria-label="お問い合わせを見る">お問い合わせ</button>
        </div>
      </div>
      <div class="face right" data-face="right">
        <div class="face-panel">
          <button type="button" data-modal="service" aria-label="サービスを見る">サービス</button>
        </div>
      </div>
      <div class="face left" data-face="left">
        <div class="face-panel">
          <button type="button" data-modal="product" aria-label="製品を見る">製品</button>
        </div>
      </div>
      <div class="face top" data-face="top">
        <div class="face-panel">
          <button type="button" data-modal="blog" aria-label="ブログを見る">ブログ</button>

        </div>
      </div>
    </div>
  </div>
  </div>

  <p class="hint">
    🖱️ ドラッグで回転 / <kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> キー / 右上ボタンで自動回転ON/OFF / <kbd>ESC</kbd> で閉じる
  </p>
</section>

<!-- ======= MODAL ======= -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
  <div class="modal">
    <button id="modal-close" class="modal-close" aria-label="モーダルを閉じる">✕</button>
    <span class="tag" id="modal-tag">PREVIEW</span>
    <h2 id="modal-title">タイトル</h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <span class="preview-note">※ 本ページは後日公開予定 — 現在はプレビュー表示です。</span>
    </div>
  </div>
</div>

<script>
/* ============================================================
   Modal-Preview Auto-Rotate Cube — Sample LLC (2026/4/22)
   ============================================================ */
(function () {
  'use strict';

  // ---------- Real page links (override modal preview) ----------
  // 本物の遷移先ページが出来たら、ここに data-modal キーと URL を登録する。
  // 登録されたキーは「扉が開く演出 → 実ページへ遷移」になる（モーダルは出ない）。
  // 未登録のキーはモーダルプレビュー（サンプル）が表示される。
  const LINKS = {
    // blog:    'https://newarc.jp/naviarc/',   ← テスト済みのためコメントアウト
    // company: '/company.html',
    // service: '/service.html',
  };

  // ---------- Data (Sample content) ----------
  const CONTENT = {
    company: {
      tag: 'COMPANY',
      title: '会社概要',
      body: `Sample合同会社<br>不動産FP専門。2021年設立、東京都港区に本社を構え、資産形成・相続・不動産投資に特化した独立系ファイナンシャルプランナーとして、個人・法人問わず最適な資産戦略をデザインしています。宅地建物取引業免許・CFP®保有の専門家チームが、中立的な視点で「所有」から「活用」へと導き、長期視点での資産アーキテクチャを構築します。`
    },
    contact: {
      tag: 'CONTACT',
      title: 'お問い合わせ',
      body: `お問い合わせフォーム。資産運用、相続対策、不動産購入・売却、法人向け資産コンサルティングなど、あらゆるご相談を承ります。初回60分無料相談を実施中。オンライン面談可。お電話・メール・本サイトのフォームからお気軽にどうぞ。<br><br>📧 info@sample.example.jp<br>📞 03-0000-0000<br>🕐 平日 10:00 – 18:00`
    },
    service: {
      tag: 'SERVICE',
      title: 'サービス',
      body: `不動産FPサービス一覧。① ライフプラン策定とキャッシュフロー分析、② 収益不動産の選定・購入サポート、③ 相続・事業承継プランニング、④ 法人向けCRE（企業不動産）戦略、⑤ 出口戦略・売却コンサル。金融商品販売に依存しないFEE ONLY型で、お客様の利益のみに忠実な提案をお約束します。`
    },
    product: {
      tag: 'PRODUCT',
      title: '製品',
      body: `自社開発プロダクト。① 「SampleSimu」— 不動産収支30年シミュレーションSaaS、② 「SampleLedger」— 賃貸オーナー向け確定申告支援ツール、③ 「SampleMap」— エリア別の賃料・空室率可視化ダッシュボード。FP実務の知見をテクノロジーで再構築し、透明性の高い意思決定を支援します。`
    },
    blog: {
      tag: 'BLOG',
      title: 'ブログ',
      body: `Sample Insights。最新記事：「2026年の住宅ローン金利動向と借換えタイミング」「区分マンション vs 一棟アパート：税引後CFで比較」「相続時精算課税の改正ポイント」など、不動産FPの実務目線で週1本更新。メルマガ登録で新着を見逃しません。`
    },
    close: null // bottom face closes / scrolls
  };

  // ---------- Elements ----------
  const scene = document.getElementById('hero-cube');
  const sceneWrap = document.querySelector('.scene-wrap');
  const cube = document.getElementById('cube');
  const faces = Array.from(document.querySelectorAll('.face'));
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modal-title');
  const modalBody = document.getElementById('modal-body');
  const modalTag = document.getElementById('modal-tag');
  const modalClose = document.getElementById('modal-close');
  const rotateToggle = document.getElementById('rotate-toggle');

  // ---------- State ----------
  let rotY = 0;
  let rotX = 20;
  let rotZ = 0;
  let baseRotX = 20;  // X軸の基準値（ドラッグで更新、オシレーションはこれに加算）
  let auto = true;
  let dragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let rotStartY = 0;
  let rotStartX = 0;
  let tickCount = 0;  // rotation phase (frozen during drag)
  let floatTime = 0;  // floating phase (always advances)

  // LocalStorage: remember rotation preference
  try {
    const saved = localStorage.getItem('sample_auto_rotate');
    if (saved === 'false') auto = false;
  } catch (e) { /* no-op */ }
  updateToggleLabel();

  // ---------- Render ----------
  function render() {
    cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
    updateFrontFace();
  }

  // Determine which face is closest to camera
  function updateFrontFace() {
    // Normalize rotY into [0, 360)
    let y = ((rotY % 360) + 360) % 360;
    let x = ((rotX % 360) + 360) % 360;

    let frontName = 'front';
    // Top/bottom override when tilt is strong
    if (x > 45 && x < 135) frontName = 'bottom';
    else if (x > 225 && x < 315) frontName = 'top';
    else {
      if (y >= 315 || y < 45) frontName = 'front';
      else if (y >= 45 && y < 135) frontName = 'left';
      else if (y >= 135 && y < 225) frontName = 'back';
      else if (y >= 225 && y < 315) frontName = 'right';
    }

    faces.forEach(f => {
      const isFront = f.dataset.face === frontName;
      f.classList.toggle('active', isFront);
      // pointer-events はCSSのbackface-visibilityで裏側を自動遮断するため、ここでは操作しない
    });
  }

  // ---------- Animation loop (multi-axis float + drift) ----------
  function tick() {
    // 位置：画面内を浮遊（常に進行、ドアが開いている間は静止）
    if (!openingFace) {
      floatTime += 1;
      // 画面幅に応じて振幅を調整（モバイルでは小さく）
      const w = window.innerWidth;
      const ampX = Math.min(90, Math.max(30, w * 0.12));  // 30〜90px
      const ampY = Math.min(55, Math.max(20, w * 0.06));  // 20〜55px
      // 異なる周期でLissajous風の漂い
      const floatX = Math.sin(floatTime * 0.0032) * ampX;
      const floatY = Math.sin(floatTime * 0.0024 + 1.3) * ampY;
      if (sceneWrap) {
        sceneWrap.style.transform = `translate(${floatX.toFixed(2)}px, ${floatY.toFixed(2)}px)`;
      }
    }
    // 回転：auto時のみ更新（baseRotXにオシレーションを加算することでドラッグ位置を尊重）
    if (auto && !dragging) {
      rotY += 0.35;                                         // Y軸連続回転
      rotX = baseRotX + Math.sin(tickCount * 0.008) * 10;   // X軸：基準値±10°で揺らぐ
      rotZ = Math.sin(tickCount * 0.005) * 6;               // Z軸 ±6°
      tickCount++;
    }
    render();
    requestAnimationFrame(tick);
  }

  // ---------- Drag (with tap-vs-drag distinction) ----------
  const DRAG_THRESHOLD = 6; // px — 6px以上動いたらドラッグ扱い。それ未満はクリック扱い
  let pointerDown = false;
  let activePointerId = null;

  function onPointerDown(e) {
    pointerDown = true;
    dragging = false; // まだドラッグ確定ではない
    activePointerId = e.pointerId;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    rotStartY = rotY;
    rotStartX = rotX;
    // 押下と同時に自動回転を停止（クリック中に面が動かないように）
    if (auto) {
      auto = false;
      updateToggleLabel();
    }
  }
  function onPointerMove(e) {
    if (!pointerDown) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    // 閾値を超えたら初めてドラッグ開始
    if (!dragging && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
      dragging = true;
      auto = false;
      updateToggleLabel();
      try { scene.setPointerCapture && scene.setPointerCapture(activePointerId); } catch(e) {}
    }
    if (dragging) {
      rotY = rotStartY + dx * 0.5;
      // ±90°まで自由にドラッグ可能（top/bottom面も正面に出せる）
      rotX = Math.max(-90, Math.min(90, rotStartX - dy * 0.3));
    }
  }
  function onPointerUp() {
    pointerDown = false;
    if (dragging) {
      dragging = false;
      // baseRotX を現在位置に更新することで、auto再開時のスナップを防ぐ
      baseRotX = rotX - Math.sin(tickCount * 0.008) * 10;
      // 自動回転は再開しない（ユーザーの位置を尊重）
    }
    activePointerId = null;
  }
  // scheduleResume は廃止：ユーザーが明示的にトグルするまで現状維持

  scene.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);

  // ---------- Hover: pause auto-rotate while aiming ----------
  scene.addEventListener('mouseenter', () => {
    // ホバー中は自動回転を停止（ドラッグ中は既にauto=false）
    if (auto) {
      auto = false;
      updateToggleLabel();
    }
  });
  // mouseleave では再開しない：ユーザーがドラッグや操作をしていた場合、
  // その位置のまま止まっていた方がクリックしやすい。再開は右上のボタンで。

  // ---------- Keyboard ----------
  window.addEventListener('keydown', (e) => {
    if (modal.classList.contains('open')) {
      if (e.key === 'Escape') closeModal();
      return;
    }
    const updateBase = () => {
      auto = false;
      updateToggleLabel();
      baseRotX = rotX - Math.sin(tickCount * 0.008) * 10;
    };
    if (e.key === 'ArrowRight') { rotY += 90; updateBase(); }
    else if (e.key === 'ArrowLeft') { rotY -= 90; updateBase(); }
    else if (e.key === 'ArrowUp') { rotX = Math.max(-90, rotX - 15); updateBase(); }
    else if (e.key === 'ArrowDown') { rotX = Math.min(90, rotX + 15); updateBase(); }
    else if (e.key === 'Escape') closeModal();
  });

  // ---------- Door-opening transition ----------
  let openingFace = null;
  const OPEN_DURATION = 650; // ms — syncs with CSS transition

  function triggerDoor(face, onDone) {
    if (openingFace) return;
    openingFace = face;
    auto = false;
    updateToggleLabel();
    scene.classList.add('zooming');
    face.classList.add('opening');
    // Disable button during anim to prevent double-click
    const btn = face.querySelector('button');
    if (btn) btn.style.pointerEvents = 'none';
    setTimeout(onDone, OPEN_DURATION);
  }

  function closeDoor() {
    if (!openingFace) return;
    openingFace.classList.remove('opening');
    scene.classList.remove('zooming');
    openingFace = null;
    // Resume auto-rotate per saved preference
    try {
      const saved = localStorage.getItem('sample_auto_rotate');
      if (saved !== 'false') {
        auto = true;
        updateToggleLabel();
      }
    } catch (e) { /* no-op */ }
  }

  // ---------- Button clicks → open door → modal ----------
  document.querySelectorAll('.face button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const face = btn.closest('.face');
      const key = btn.dataset.modal;

      if (!key || key === 'close') {
        // bottom face: open door briefly, then scroll top & close
        triggerDoor(face, () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(closeDoor, 450);
        });
        return;
      }

      // 本物の遷移先URLが登録されている場合はそこへ遷移
      if (LINKS[key]) {
        triggerDoor(face, () => {
          window.location.href = LINKS[key];
        });
        return;
      }

      // それ以外はモーダルプレビュー
      triggerDoor(face, () => openModal(key));
    });
  });

  function openModal(key) {
    const data = CONTENT[key];
    if (!data) return;
    modalTag.textContent = data.tag;
    modalTitle.innerHTML = data.title;
    modalBody.innerHTML = `<p>${data.body}</p>`;
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    modalClose.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
    // Door swings shut after modal fades out
    setTimeout(closeDoor, 250);
  }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // ---------- Auto-rotate toggle ----------
  rotateToggle.addEventListener('click', () => {
    auto = !auto;
    try { localStorage.setItem('sample_auto_rotate', auto ? 'true' : 'false'); } catch(e) {}
    updateToggleLabel();
  });
  function updateToggleLabel() {
    rotateToggle.textContent = auto ? '⏸ 自動回転ON' : '▶ 自動回転OFF';
    rotateToggle.setAttribute('aria-pressed', auto ? 'true' : 'false');
  }

  // ---------- Start ----------
  render();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
